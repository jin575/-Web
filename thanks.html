<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>送信ありがとうございました｜ととのうWeb</title>
<meta name="robots" content="noindex">
<style>
  :root{--navy:#0f2a4a;--blue:#2f6fb3;--ink:#1d2733;--sub:#5d6b7a;--accent:#1aa6a0;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",system-ui,sans-serif;color:var(--ink);line-height:1.9;background:#f4f8fc;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#fff;max-width:520px;width:100%;border:1px solid #dbe4ee;border-radius:16px;padding:48px 40px;text-align:center}
  .check{width:64px;height:64px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 24px}
  h1{font-size:1.4rem;color:var(--navy);font-weight:800;margin-bottom:14px}
  p{color:var(--sub);font-size:.95rem;margin-bottom:8px}
  .btn{display:inline-block;margin-top:28px;background:var(--navy);color:#fff;font-weight:700;font-size:.9rem;padding:12px 28px;border-radius:8px}
</style>
</head>
<body>
  <div class="card">
    <div class="check">&#10003;</div>
    <h1>お問い合わせありがとうございました</h1>
    <p>内容を確認のうえ、担当より2営業日以内にご返信いたします。</p>
    <p>（受付時間：月〜金 9:00〜20:00）</p>
    <a class="btn" href="index.html">トップへ戻る</a>
  </div>
</body>
</html>
