name: サイト自動チェック

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: コードを取得
        uses: actions/checkout@v4
      - name: Node.js を準備
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: HTML / JS の破損・リンク切れチェック
        run: node ci/check-html.js
